<!DOCTYPE html>
<html lang="es-CO">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Form2Go</title>

<meta name="theme-color" content="#4ca742">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="assets/icons/icon-192.png">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app">

<!-- LOGIN -->

<section id="loginView">

<div class="login-card">

<img src="assets/icons/icon-512.png" class="logo">

<h1>Form2Go</h1>

<form id="loginForm">

<input
type="text"
id="codigoGestor"
placeholder="Código del gestor"
required
>

<button type="submit">
INGRESAR
</button>

</form>

<p class="subtitle">
Registro ágil de campo
</p>

</div>

</section>


<!-- FORMULARIO -->

<section id="formView" style="display:none">

<header>

<img src="assets/icons/icon-192.png">

<h2>Form2Go</h2>

<p>
Gestor: <span id="gestorActivo"></span>
</p>

</header>

<form id="recordForm">

<label>Nombre del paciente</label>
<input type="text" id="nombrePaciente" required>

<label>Fecha del accidente</label>
<input type="date" id="fechaAccidente" required>

<label>Nombre compañía SOAT</label>
<input type="text" id="companiaSoat">

<label>Nombre EPS</label>
<input type="text" id="nombreEps">

<label>Celular</label>
<input type="tel" id="celular" maxlength="10" required>

<label>Confirmar celular</label>
<input type="tel" id="confirmarCelular" maxlength="10" required>

<label>Diagnóstico</label>
<textarea id="diagnostico"></textarea>

<label>Hechos</label>
<textarea id="hechos"></textarea>

<label class="check">

<input type="checkbox" id="confirmacionTelefono">

Confirmo que verifiqué el número antes de enviar

</label>

<p id="formMessage" class="form-message"></p>

<button type="submit">
ENVIAR
</button>

</form>

</section>

</div>

<script src="js/app.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
